# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Inject secrets
        env:
          CHATBOT_API_ENDPOINT: ${{ secrets.CHATBOT_API_ENDPOINT }}
          CHATBOT_API_KEY: ${{ secrets.CHATBOT_API_KEY }}
          WEB3FORMS_KEY: ${{ secrets.WEB3FORMS_KEY }}
        run: |
          python3 -c "
          import os, json
          config = {
              'apiEndpoint': os.environ['CHATBOT_API_ENDPOINT'],
              'apiKey': os.environ['CHATBOT_API_KEY']
          }
          with open('assets/js/chatbot.config.js', 'w') as f:
              f.write('window.CHATBOT_CONFIG = ' + json.dumps(config) + ';\n')
          "
          sed -i "s|__WEB3FORMS_KEY__|${WEB3FORMS_KEY}|g" index.html about.html
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
